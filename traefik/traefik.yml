log:
  level: DEBUG

accessLog: {}

entryPoints:
  web:
    address: :80
  websecure:
    address: :443
  smtp:
    address: :25
  smtps:
    address: :465

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /certs/acme.json
      httpChallenge:
        entryPoint: web
      tlsChallenge: {}

providers:
  file:
    filename: /etc/traefik/traefik-dynamic.yml
    watch: true
