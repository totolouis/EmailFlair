<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Email Security Relay — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0b0e14;
    --panel: #121722;
    --border: #232b3a;
    --text: #e6e9ef;
    --muted: #8b94a7;
    --accent: #4f8cff;
    --green: #35c46a;
    --amber: #f2b84b;
    --red: #f24b4b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: 0.2px; }
  header h1 span { color: var(--accent); }
  #apiKeyBox { display: flex; gap: 8px; align-items: center; }
  input, button, select {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  button { cursor: pointer; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger { background: transparent; border-color: var(--red); color: var(--red); }
  main { padding: 24px 28px; max-width: 1100px; margin: 0 auto; }
  .kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
  .kpi { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .kpi .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; }
  .kpi .value { font-size: 24px; font-weight: 600; margin-top: 4px; }
  section { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 20px; }
  section h2 { font-size: 14px; margin: 0 0 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge.ACTIVE, .badge.FORWARDED { background: rgba(53,196,106,0.15); color: var(--green); }
  .badge.PENDING_DNS, .badge.QUARANTINED { background: rgba(242,184,75,0.15); color: var(--amber); }
  .badge.REJECTED, .badge.SUSPENDED { background: rgba(242,75,75,0.15); color: var(--red); }
  .muted { color: var(--muted); }
  code { background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  .empty { color: var(--muted); font-style: italic; padding: 12px 0; }
</style>
</head>
<body>
<header>
  <h1>Email Security <span>Relay</span></h1>
  <div id="apiKeyBox">
    <input id="apiKey" placeholder="Tenant API key" />
    <button class="primary" onclick="saveKeyAndRefresh()">Connect</button>
  </div>
</header>

<main>
  <div class="kpis" id="kpis"></div>

  <section>
    <h2>Add a domain</h2>
    <div class="row">
      <input id="newDomain" placeholder="company.com" style="flex:1; min-width:220px;" />
      <button class="primary" onclick="addDomain()">Detect &amp; Add</button>
    </div>
    <div id="domainInstructions"></div>
  </section>

  <section>
    <h2>Domains</h2>
    <table id="domainsTable">
      <thead><tr><th>Domain</th><th>Provider</th><th>Status</th><th>Relay target</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h2>Recent email activity</h2>
    <div class="row">
      <select id="statusFilter" onchange="loadEmails()">
        <option value="">All statuses</option>
        <option value="FORWARDED">Forwarded</option>
        <option value="QUARANTINED">Quarantined</option>
        <option value="REJECTED">Rejected</option>
      </select>
    </div>
    <table id="emailsTable">
      <thead><tr><th>Received</th><th>From</th><th>To</th><th>Subject</th><th>Score</th><th>Status</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
  </section>
</main>

<script>
let API_KEY = localStorage.getItem('esr_api_key') || '';
document.getElementById('apiKey').value = API_KEY;

function saveKeyAndRefresh() {
  API_KEY = document.getElementById('apiKey').value.trim();
  localStorage.setItem('esr_api_key', API_KEY);
  refreshAll();
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${API_KEY}`, ...(opts.headers || {}) },
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || `HTTP ${res.status}`);
  }
  return res.status === 204 ? null : res.json();
}

async function loadKpis() {
  try {
    const { totals, activeDomains } = await api('/emails/summary');
    const kpis = [
      { label: 'Active domains', value: activeDomains },
      { label: 'Forwarded', value: totals.FORWARDED || 0 },
      { label: 'Quarantined', value: totals.QUARANTINED || 0 },
      { label: 'Rejected', value: totals.REJECTED || 0 },
      { label: 'Total processed', value: (totals.FORWARDED || 0) + (totals.QUARANTINED || 0) + (totals.REJECTED || 0) },
    ];
    document.getElementById('kpis').innerHTML = kpis.map((k) => `
      <div class="kpi"><div class="label">${k.label}</div><div class="value">${k.value}</div></div>
    `).join('');
  } catch (e) { /* not connected yet */ }
}

async function loadDomains() {
  const tbody = document.querySelector('#domainsTable tbody');
  try {
    const { domains } = await api('/domains');
    if (!domains.length) { tbody.innerHTML = `<tr><td colspan="5" class="empty">No domains yet — add one above.</td></tr>`; return; }
    tbody.innerHTML = domains.map((d) => `
      <tr>
        <td>${d.name}</td>
        <td>${d.provider}</td>
        <td><span class="badge ${d.status}">${d.status}</span></td>
        <td><code>${d.relayTarget}</code></td>
        <td>${d.status === 'PENDING_DNS' ? `<button onclick="activateDomain('${d.name}')">Check &amp; activate</button>` : ''}</td>
      </tr>
    `).join('');
  } catch (e) { tbody.innerHTML = `<tr><td colspan="5" class="empty">${e.message}</td></tr>`; }
}

async function addDomain() {
  const name = document.getElementById('newDomain').value.trim();
  if (!name) return;
  const box = document.getElementById('domainInstructions');
  try {
    const { domain, instructions } = await api('/domains', { method: 'POST', body: JSON.stringify({ name }) });
    box.innerHTML = `
      <div class="muted" style="margin-top:8px;">
        Detected provider: <b>${domain.provider}</b><br/>
        Change your MX record — before: <code>${instructions.before}</code> → after: <code>${instructions.after}</code>
      </div>`;
    document.getElementById('newDomain').value = '';
    loadDomains(); loadKpis();
  } catch (e) { box.innerHTML = `<div class="muted">${e.message}</div>`; }
}

async function activateDomain(name) {
  try {
    await api(`/domains/${encodeURIComponent(name)}/activate`, { method: 'POST' });
    loadDomains(); loadKpis();
  } catch (e) { alert(e.message); }
}

async function loadEmails() {
  const status = document.getElementById('statusFilter').value;
  const tbody = document.querySelector('#emailsTable tbody');
  try {
    const { emails } = await api(`/emails${status ? `?status=${status}` : ''}`);
    if (!emails.length) { tbody.innerHTML = `<tr><td colspan="7" class="empty">No messages processed yet.</td></tr>`; return; }
    tbody.innerHTML = emails.map((e) => `
      <tr>
        <td class="muted">${new Date(e.receivedAt).toLocaleString()}</td>
        <td>${e.sender || '—'}</td>
        <td>${e.recipient || '—'}</td>
        <td>${e.subject || '(no subject)'}</td>
        <td>${e.spamScore}</td>
        <td><span class="badge ${e.status}">${e.status}</span></td>
        <td>${e.status === 'QUARANTINED' ? `<button onclick="releaseEmail('${e.id}')">Release</button> <button class="danger" onclick="deleteEmail('${e.id}')">Delete</button>` : ''}</td>
      </tr>
    `).join('');
  } catch (e) { tbody.innerHTML = `<tr><td colspan="7" class="empty">${e.message}</td></tr>`; }
}

async function releaseEmail(id) { try { await api(`/emails/${id}/release`, { method: 'POST' }); loadEmails(); loadKpis(); } catch (e) { alert(e.message); } }
async function deleteEmail(id) { try { await api(`/emails/${id}`, { method: 'DELETE' }); loadEmails(); loadKpis(); } catch (e) { alert(e.message); } }

function refreshAll() { loadKpis(); loadDomains(); loadEmails(); }
if (API_KEY) refreshAll();
setInterval(() => { if (API_KEY) refreshAll(); }, 15000);
</script>
</body>
</html>
