volumes:
  relay-data:
  traefik-data:
  certbot-data:

services:
  traefik:
    image: traefik:v3.2
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "25:25"     # SMTP (plain TCP passthrough, relay handles STARTTLS)
      - "465:465"   # SMTPS (TLS termination via ACME cert)
      - "80:80"     # HTTP (redirects to HTTPS + ACME challenge routing)
      - "443:443"   # HTTPS API + dashboard
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - RELAY_HOSTNAME=${RELAY_HOSTNAME}
    volumes:
      - traefik-data:/certs
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    entrypoint: /bin/sh
    command:
      - -c
      - |
        certbot certonly --standalone --http-01-port 8080 \
          -d $$RELAY_HOSTNAME --non-interactive --agree-tos --no-eff-email -m $$CERTBOT_EMAIL \
        && trap exit TERM \
        && while :; do certbot renew --non-interactive && sleep 12h; done
    environment:
      RELAY_HOSTNAME: ${RELAY_HOSTNAME}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
    volumes:
      - certbot-data:/etc/letsencrypt
    restart: unless-stopped
    depends_on:
      - traefik

  relay:
    build: .
    image: email-security-relay:latest
    # Ports are NOT exposed to the host — Traefik reaches the relay via
    # internal Docker networking (relay:2525, relay:3000 in traefik.yml).
    # Uncomment below for direct testing (localhost:2525 / localhost:3000):
    # ports:
    #   - "2525:2525"
    environment:
      RELAY_ID: ${RELAY_ID:-relay-01}
      RELAY_SECRET: ${RELAY_SECRET}
      RELAY_HOSTNAME: ${RELAY_HOSTNAME}
      SMTP_PORT: 2525
      API_PORT: 3000
      TLS_CERT_DIR: /app/data/tls
      SPAM_QUARANTINE_THRESHOLD: ${SPAM_QUARANTINE_THRESHOLD:-5}
      SPAM_REJECT_THRESHOLD: ${SPAM_REJECT_THRESHOLD:-10}
      DB_PATH: /app/data/relay.db
      QUARANTINE_DIR: /app/data/quarantine
      DEFAULT_TENANT_API_KEY: ${DEFAULT_TENANT_API_KEY:-dev-tenant-key}
    volumes:
      - relay-data:/app/data
      - certbot-data:/etc/letsencrypt:ro
    restart: unless-stopped
