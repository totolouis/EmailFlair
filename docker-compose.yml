volumes:
  relay-data:
  traefik-data:

services:
  traefik:
    image: traefik:v3.2
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "25:25"     # SMTP (plain TCP passthrough to relay:2525)
      - "465:465"   # SMTPS (TLS termination via ACME cert)
      - "80:80"     # HTTP (redirects to HTTPS + ACME HTTP-01 challenge)
      - "443:443"   # HTTPS API + dashboard
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - RELAY_HOSTNAME=${RELAY_HOSTNAME}
    volumes:
      - traefik-data:/certs
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/traefik-dynamic.yml:/etc/traefik/traefik-dynamic.yml:ro
    restart: unless-stopped

  relay:
    build: .
    image: email-security-relay:latest
    # Ports are NOT exposed to the host — Traefik reaches the relay via
    # internal Docker networking (relay:2525, relay:3000 in traefik.yml).
    # Uncomment below for direct testing (localhost:2525 / localhost:3000):
    # ports:
    #   - "2525:2525"
    environment:
      RELAY_ID: ${RELAY_ID:-relay-01}
      RELAY_SECRET: ${RELAY_SECRET}
      RELAY_HOSTNAME: ${RELAY_HOSTNAME}
      SMTP_PORT: 2525
      API_PORT: 3000
      SPAM_QUARANTINE_THRESHOLD: ${SPAM_QUARANTINE_THRESHOLD:-5}
      SPAM_REJECT_THRESHOLD: ${SPAM_REJECT_THRESHOLD:-10}
      DB_PATH: /app/data/relay.db
      QUARANTINE_DIR: /app/data/quarantine
      DEFAULT_TENANT_API_KEY: ${DEFAULT_TENANT_API_KEY:-dev-tenant-key}
    volumes:
      - relay-data:/app/data
    labels:
      - "traefik.enable=true"

      # HTTP — HTTPS API + dashboard
      - "traefik.http.routers.relay-api.rule=Host(`${RELAY_HOSTNAME}`)"
      - "traefik.http.routers.relay-api.entrypoints=websecure"
      - "traefik.http.routers.relay-api.tls=true"
      - "traefik.http.routers.relay-api.tls.certResolver=letsencrypt"
      - "traefik.http.services.relay-api.loadbalancer.server.port=3000"

      # HTTP — redirect HTTP to HTTPS
      - "traefik.http.routers.relay-http.rule=Host(`${RELAY_HOSTNAME}`)"
      - "traefik.http.routers.relay-http.entrypoints=web"
      - "traefik.http.routers.relay-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"

      # TCP — SMTP plain (port 25)
      - "traefik.tcp.routers.smtp-passthrough.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.smtp-passthrough.entrypoints=smtp"
      - "traefik.tcp.routers.smtp-passthrough.service=smtp-relay"
      - "traefik.tcp.services.smtp-relay.loadbalancer.server.port=2525"

      # TCP — SMTPS (port 465, TLS termination)
      - "traefik.tcp.routers.smtps-termination.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.smtps-termination.entrypoints=smtps"
      - "traefik.tcp.routers.smtps-termination.tls=true"
      - "traefik.tcp.routers.smtps-termination.tls.certResolver=letsencrypt"
      - "traefik.tcp.routers.smtps-termination.service=smtp-relay"
    restart: unless-stopped
